# 복사형 그림체 LoRA - 체크포인트 영향 최소화, 최강 스타일 복사
# rank 32, conv_dim 16, alpha=rank → 최대 강도
# TE 저LR 학습 → 트리거워드에 스타일 강하게 묶임

preprocess:
  skip_preprocess: true
  resize_mode: "crop"

caption:
  method: "wd-tagger"
  wd_tagger_threshold: 0.30
  exclude_tags: []

training:
  network_module: "lycoris.kohya"
  network_args:
    - "algo=locon"
    - "conv_dim=16"
    - "conv_alpha=16"
  lora_rank: 32
  lora_alpha: 32             # alpha=rank → 최대 강도

  unet_lr: 0.0004
  text_encoder_lr: 0.00003   # TE 저LR → 트리거워드에 스타일 강하게 묶임

  num_epochs: 25
  target_steps: 5000

  lr_scheduler: "cosine_with_restarts"
  lr_scheduler_num_cycles: 4
  lr_warmup_steps: 250

  caption_dropout_rate: 0.15
  noise_offset: 0.1
  min_snr_gamma: 5
  shuffle_caption: true
  keep_tokens: 1
