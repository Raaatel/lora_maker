# 복사형 그림체 LoRA - 체크포인트 영향 최소화, 최강 스타일 복사
# LoCon rank64 + 높은 conv_dim으로 텍스처/색감/붓터치까지 학습
# alpha=rank → 최대 강도, TE도 저LR로 같이 학습 → 트리거워드에 스타일 강하게 묶임

preprocess:
  skip_preprocess: true
  resize_mode: "crop"

caption:
  method: "wd-tagger"
  wd_tagger_threshold: 0.30
  exclude_tags: []

training:
  network_module: "lycoris.kohya"
  network_args:
    - "algo=locon"
    - "conv_dim=32"
    - "conv_alpha=32"
  lora_rank: 64
  lora_alpha: 64             # alpha=rank → 최대 강도

  unet_lr: 0.0008
  text_encoder_lr: 0.00005   # TE 저LR 같이 학습 → 트리거워드에 스타일 강하게 묶임

  num_epochs: 30
  target_steps: 6000

  lr_scheduler: "cosine_with_restarts"
  lr_scheduler_num_cycles: 4
  lr_warmup_steps: 300

  caption_dropout_rate: 0.15  # 드롭아웃 낮게 → 스타일 일관성 강화
  noise_offset: 0.1
  min_snr_gamma: 5
  shuffle_caption: true
  keep_tokens: 1
