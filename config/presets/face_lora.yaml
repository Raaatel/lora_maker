# 얼굴 LoRA
# 특정 인물의 얼굴 특징을 학습 (웹툰 캐릭터 얼굴)

preprocess:
  skip_preprocess: false
  face_margin_top: 2.0
  face_margin_sides: 1.5

caption:
  method: "wd-tagger"
  wd_tagger_threshold: 0.35
  exclude_tags:
    - "simple background"
    - "white background"

training:
  lora_rank: 16
  lora_alpha: 8

  unet_lr: 0.0001
  text_encoder_lr: [0.00004, 0.00004]
  network_train_unet_only: false

  num_epochs: 10
  target_steps: 1500

  lr_scheduler: "cosine"
  lr_warmup_steps: 50

  noise_offset: 0.03
  min_snr_gamma: 5

  shuffle_caption: true
  keep_tokens: 1
